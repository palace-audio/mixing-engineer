<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixing Engineer · Metrics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    background: #1a1a1a;
    color: #d8d8d8;
    font-family: ui-monospace, Menlo, monospace;
    padding: 6px 8px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9.5px;
    line-height: 1.3;
    padding: 1px 0;
  }
  .lbl {
    font-size: 7px;
    color: #555;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    min-width: 26px;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 4px #4caf50;
    flex-shrink: 0;
  }
  .dot.offline { background: #e57373; box-shadow: 0 0 4px #e57373; }
  .dot.thinking { background: #d4a574; box-shadow: 0 0 4px #d4a574; animation: pulse 1.1s ease-in-out infinite; }
  #status { color: #d8d8d8; }
  #cost { color: #d4a574; font-weight: 600; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Stat</span><span id="dot" class="dot"></span><span id="status">Ready</span></div>
  <div class="row"><span class="lbl">Cost</span><span id="cost">$0.000</span></div>
  <div class="row"><span class="lbl">Tok</span><span id="tok">0</span></div>

  <script>
    const statusEl = document.getElementById('status');
    const dotEl    = document.getElementById('dot');
    const costEl   = document.getElementById('cost');
    const tokEl    = document.getElementById('tok');

    function setStatus(s) {
      const text = String(s || "Ready");
      statusEl.textContent = text;
      dotEl.className = "dot";
      const lower = text.toLowerCase();
      if (lower === "offline" || lower === "error" || lower === "disconnected") {
        dotEl.classList.add("offline");
      } else if (lower === "thinking" || lower === "loading") {
        dotEl.classList.add("thinking");
      }
    }
    function setCost(c) {
      const n = parseFloat(c) || 0;
      costEl.textContent = "$" + n.toFixed(3);
    }
    function setTok(t) {
      const n = parseInt(t, 10) || 0;
      tokEl.textContent = n >= 1000 ? (n / 1000).toFixed(1) + "k" : String(n);
    }

    // Combined update from chat jweb: `metrics <status> <cost> <tokens>`.
    function applyMetrics(status, cost, tokens) {
      setStatus(status);
      setCost(cost);
      setTok(tokens);
    }

    if (window.max && typeof window.max.bindInlet === "function") {
      window.max.bindInlet("metrics", applyMetrics);
      window.max.bindInlet("status",  setStatus);
      window.max.bindInlet("cost",    setCost);
      window.max.bindInlet("tok",     setTok);
    }
  </script>
</body>
</html>
