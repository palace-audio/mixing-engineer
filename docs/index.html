<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mix Engineer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="titlebar">
    <div class="brand">
      <span class="mark">Palace Audio</span>
      <span class="name">Mixing Engineer</span>
    </div>
    <div class="spacer"></div>
    <div class="metrics">
      <span class="stat-group">
        <span id="status" class="disconnected"></span>
        <span id="status-text">Offline</span>
      </span>
      <span id="cost">$0.000</span>
      <span id="tok">0 tok</span>
    </div>
    <button id="settings-gear" title="Settings" aria-label="Settings">⚙</button>
  </div>
  <div id="settings-menu" class="hidden">
    <a href="#" id="settings-change">Change provider / model</a>
    <a href="#" id="settings-clear">Clear settings</a>
  </div>

  <div id="messages"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Ask about your mix..." rows="2"></textarea>
    <button id="send" title="Send">→</button>
  </div>
</div>

<div id="settings-overlay" class="hidden">
  <div id="settings-card">
    <h2>Model provider</h2>
    <p>Choose the model provider and enter its details.</p>

    <label class="settings-field-label" for="settings-provider">Provider</label>
    <select id="settings-provider" class="settings-input"></select>

    <div id="settings-baseurl-row" class="settings-field hidden">
      <label class="settings-field-label" for="settings-baseurl">Base URL</label>
      <input id="settings-baseurl" class="settings-input" type="text" placeholder="https://…/v1" autocomplete="off" spellcheck="false">
    </div>

    <div id="settings-model-row" class="settings-field hidden">
      <label class="settings-field-label" for="settings-model">Model</label>
      <input id="settings-model" class="settings-input" type="text" placeholder="model id" autocomplete="off" spellcheck="false">
    </div>

    <label class="settings-field-label" for="settings-key-input" id="settings-key-label">API key</label>
    <input id="settings-key-input" class="settings-input" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">

    <div id="settings-cors-hint" class="hidden"></div>
    <div id="settings-error"></div>
    <div id="settings-actions">
      <button id="settings-cancel" class="hidden">Cancel</button>
      <button id="settings-save">Save</button>
    </div>
    <div id="settings-help">
      <span id="settings-help-text">Get your key at console.anthropic.com</span>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
